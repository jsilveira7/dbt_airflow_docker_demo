ebury:
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      user: "{{ env_var('POSTGRES_USER', 'airflow') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'airflow') }}"
      port: "{{ env_var('POSTGRES_PORT', 5432) | as_number }}"
      dbname: ebury_analytics
      schema: staging
      threads: 4
      keepalives_idle: 0

    prod:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      user: "{{ env_var('POSTGRES_USER', 'airflow') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'airflow') }}"
      port: "{{ env_var('POSTGRES_PORT', 5432) | as_number }}"
      dbname: ebury_analytics
      schema: marts
      threads: 4
      keepalives_idle: 0

  target: dev
